<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Simulador de recarga em eletroposto</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      margin-left: 270px;
    }

    /* Painel lateral */
    #painelHistorico {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100%;
      background: #f5f5f5;
      border-right: 2px solid #000;
      padding: 10px;
      overflow-y: auto;
    }


    .barra-container {
      width: 300px;
      height: 30px;
      border: 2px solid #000;
      margin: 20px auto;
    }

    .barra {
      height: 100%;
      width: 0%;
      background: green;
      transition: width 0.2s;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>


    
  <h1>Simulador de Carregamento</h1>

  <h2>Bateria: <span id="bateria">0</span>%</h2>

  <div class="barra-container">
    <div class="barra" id="barra"></div>
  </div>

  <p>Status: <span id="status">Pronto</span></p>
  <p>Tempo estimado: <span id="tempo">--</span></p>

  <button onclick="iniciar()">Iniciar</button>
  <button onclick="parar()">Parar</button>

  <!-- Painel lateral -->
  <div id="painelHistorico">
    <h3>Histórico</h3>
    <button onclick="limparHistorico()">Limpar</button>
    <ul id="historico"></ul>
  </div>

  <script>
  </script>

</body>

</html>
