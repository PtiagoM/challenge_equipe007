<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Simulador de recarga em eletroposto</title>
  <style src="style.css"></style>
  <script src="script.js"></script>
</head>

<body>

  <h1>Simulador de Carregamento</h1>

  <h2>Bateria: <span id="bateria">0</span>%</h2>

  <div class="barra-container">
    <div class="barra" id="barra"></div>
  </div>

  <p>Status: <span id="status">Pronto</span></p>
  <p>Tempo estimado: <span id="tempo">--</span></p>

  <button onclick="iniciar()">Iniciar</button>
  <button onclick="parar()">Parar</button>

  <!-- Painel lateral -->
  <div id="painelHistorico">
    <h3>Histórico</h3>
    <button onclick="limparHistorico()">Limpar</button>
    <ul id="historico"></ul>
  </div>

</body>

</html>
